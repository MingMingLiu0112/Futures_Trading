server {
    listen 80 default_server;
    server_name _;

    # 主页面 - 根路径指向PTA分析平台
    location / {
        proxy_pass http://127.0.0.1:8422/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 缠论分析页面（兼容旧链接）
    location /chan/ {
        proxy_pass http://127.0.0.1:8422/chan/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API接口
    location /api/ {
        proxy_pass http://127.0.0.1:8422/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # API缓存
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 静态文件
    location /static/ {
        alias /home/admin/.openclaw/workspace/codeman/pta_analysis/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # 历史数据页面
    location /history {
        proxy_pass http://127.0.0.1:8422/history;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 宏观分析页面
    location /macro {
        proxy_pass http://127.0.0.1:8422/macro;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 原始vnpy服务（保留）
    location /vnpy/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # vnpy WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8767/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}