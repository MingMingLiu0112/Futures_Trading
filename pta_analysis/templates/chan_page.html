<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTA 缠论分析</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1117; color: #e6edf3; overflow: hidden; }
        .header { background: #161b22; padding: 8px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #30363d; }
        .header h4 { color: #e94560; margin: 0; font-size: 1rem; }
        .header .price { font-size: 0.9rem; }
        .header .price.up { color: #f23645; }
        .header .price.down { color: #089981; }
        select, .btn-sm { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
        .btn-sm:hover { background: #30363d; }
        .btn-sm.active { background: #e94560; border-color: #e94560; }
        .btn-home { background: #e94560; border: none; text-decoration: none; padding: 4px 12px; border-radius: 6px; color: #fff; font-size: 0.8rem; }
        #chart { width: 100vw; height: calc(100vh - 48px); }
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #e94560; z-index: 1000; }
        .chan-info { display: flex; gap: 20px; align-items: center; }
        .chan-badge { background: #21262d; border: 1px solid #30363d; border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; }
        .chan-badge .num { color: #e94560; font-weight: bold; }
        .chan-badge.bi { border-color: #6bcb77; }
        .chan-badge.seg { border-color: #ffd93d; }
        .chan-badge.zs { border-color: #e94560; }
        .chan-badge.bs { border-color: #ff6b6b; }
        .toggle-row { display: flex; gap: 8px; align-items: center; }
        .toggle-btn { font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; border: 1px solid #30363d; background: #21262d; color: #8b949e; cursor: pointer; }
        .toggle-btn.on { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <h4>📊 PTA 缠论分析</h4>
        <span class="price" id="price">加载中...</span>
        <select id="period">
            <option value="1min">1分钟</option>
            <option value="5min">5分钟</option>
            <option value="15min">15分钟</option>
            <option value="30min">30分钟</option>
            <option value="60min">60分钟</option>
            <option value="1day">日线</option>
        </select>
        <div class="toggle-row">
            <span style="font-size:0.75rem;color:#8b949e">叠加:</span>
            <button class="toggle-btn on" id="toggle-bi" onclick="toggleLayer('bi')">笔</button>
            <button class="toggle-btn" id="toggle-seg" onclick="toggleLayer('seg')">线段</button>
            <button class="toggle-btn" id="toggle-zs" onclick="toggleLayer('zs')">中枢</button>
            <button class="toggle-btn" id="toggle-bs" onclick="toggleLayer('bs')">买卖点</button>
        </div>
        <div class="chan-info" id="chan-info"></div>
        <button class="btn-home" onclick="loadData()">🔄 刷新</button>
        <a href="/" class="btn-home">🏠 返回</a>
    </div>
    <div id="chart"></div>
    <div class="loading" id="loading">正在加载缠论数据...</div>

    <script>
        var chart = null;
        var currentPeriod = '1min';
        var chanData = null;
        var layers = { bi: true, seg: false, zs: false, bs: false };

        function init() {
            chart = echarts.init(document.getElementById('chart'));
            loadData();
            window.addEventListener('resize', function() { chart.resize(); });
        }

        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            try {
                var resp = await fetch('/api/chan/analysis?period=' + currentPeriod);
                var result = await resp.json();
                if (result.error) {
                    console.error(result.error);
                    document.getElementById('loading').textContent = result.error;
                    return;
                }
                chanData = result;
                renderChart(result);
                updateChanInfo(result);
                updatePrice(result);
            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('loading').textContent = '加载失败: ' + e.message;
            }
            document.getElementById('loading').style.display = 'none';
        }

        function renderChart(result) {
            var klines = result.klines;
            var timeData = klines.map(function(d) { return d.time; });
            var candleData = klines.map(function(d) { return [d.open, d.close, d.low, d.high]; });
            var volData = klines.map(function(d) { return d.volume; });

            // 计算均线
            var ma5 = calcMA(candleData, 5, 1);
            var ma10 = calcMA(candleData, 10, 1);
            var ma20 = calcMA(candleData, 20, 1);

            // 计算MACD
            var macd = calcMACD(candleData.map(function(d) { return d[1]; }));

            // 计算KDJ
            var kdj = calcKDJ(candleData);

            var option = {
                backgroundColor: '#0d1117',
                animation: false,
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' }, backgroundColor: 'rgba(22,33,62,0.95)', borderColor: '#e94560', textStyle: { color: '#e6edf3' } },
                legend: { data: ['K线','MA5','MA10','MA20'], top: 5, textStyle: { color: '#8b949e' }, selected: { 'MA10': false, 'MA20': false } },
                toolbox: { right: '2%', top: 0, feature: { dataZoom: { yAxisIndex: 'none', title: { zoom: '缩放', back: '还原' } }, restore: { title: '还原' }, saveAsImage: { title: '保存' } } },
                grid: [
                    { left: '6%', right: '3%', top: '12%', height: '48%' },
                    { left: '6%', right: '3%', top: '65%', height: '14%' },
                    { left: '6%', right: '3%', top: '83%', height: '13%' }
                ],
                xAxis: [
                    { type: 'category', data: timeData, gridIndex: 0, boundaryGap: false, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { show: false } },
                    { type: 'category', data: timeData, gridIndex: 1, boundaryGap: false, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { show: false }, splitLine: { show: false } },
                    { type: 'category', data: timeData, gridIndex: 2, boundaryGap: false, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { show: false } }
                ],
                yAxis: [
                    { type: 'value', scale: true, gridIndex: 0, splitLine: { lineStyle: { color: '#21262d' } }, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#8b949e' }, position: 'left' },
                    { type: 'value', scale: true, gridIndex: 1, splitLine: { show: false }, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { show: false } },
                    { type: 'value', scale: true, gridIndex: 2, splitLine: { show: false }, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#8b949e', fontSize: 9 } }
                ],
                dataZoom: [
                    { type: 'inside', xAxisIndex: [0,1,2], start: 70, end: 100 },
                    { type: 'slider', xAxisIndex: [0,1,2], bottom: '1%', height: 18, start: 70, end: 100, borderColor: '#30363d', fillerColor: 'rgba(233,69,96,0.15)', handleStyle: { color: '#e94560' }, textStyle: { color: '#8b949e' } }
                ],
                series: buildSeries(candleData, ma5, ma10, ma20, macd, kdj, volData)
            };
            chart.setOption(option, true);
        }

        function buildSeries(candle, ma5, ma10, ma20, macd, kdj, vol) {
            var series = [
                // K线
                { name: 'K线', type: 'candlestick', data: candle, xAxisIndex: 0, yAxisIndex: 0,
                  itemStyle: { color: '#f23645', color0: '#089981', borderColor: '#f23645', borderColor0: '#089981' } },
                // 均线
                { name: 'MA5', type: 'line', data: ma5, xAxisIndex: 0, yAxisIndex: 0, smooth: true, symbol: 'none', lineStyle: { color: '#ff6b6b', width: 1 } },
                { name: 'MA10', type: 'line', data: ma10, xAxisIndex: 0, yAxisIndex: 0, smooth: true, symbol: 'none', lineStyle: { color: '#ffd93d', width: 1 } },
                { name: 'MA20', type: 'line', data: ma20, xAxisIndex: 0, yAxisIndex: 0, smooth: true, symbol: 'none', lineStyle: { color: '#6bcb77', width: 1 } },
                // MACD
                { name: 'MACD', type: 'bar', data: macd.bar.map(function(v) { return { value: v, itemStyle: { color: v >= 0 ? '#f23645' : '#089981' } }; }), xAxisIndex: 1, yAxisIndex: 1 },
                { name: 'DIF', type: 'line', data: macd.diff, xAxisIndex: 1, yAxisIndex: 1, smooth: true, symbol: 'none', lineStyle: { color: '#6bcb77', width: 1 } },
                { name: 'DEA', type: 'line', data: macd.dea, xAxisIndex: 1, yAxisIndex: 1, smooth: true, symbol: 'none', lineStyle: { color: '#ff6b6b', width: 1 } },
                // KDJ
                { name: 'K', type: 'line', data: kdj.k, xAxisIndex: 2, yAxisIndex: 2, smooth: true, symbol: 'none', lineStyle: { color: '#ff6b6b', width: 1 } },
                { name: 'D', type: 'line', data: kdj.d, xAxisIndex: 2, yAxisIndex: 2, smooth: true, symbol: 'none', lineStyle: { color: '#ffd93d', width: 1 } },
                { name: 'J', type: 'line', data: kdj.j, xAxisIndex: 2, yAxisIndex: 2, smooth: true, symbol: 'none', lineStyle: { color: '#6bcb77', width: 1 } }
            ];

            // 添加缠论元素
            if (chanData && chanData.echarts) {
                var echarts = chanData.echarts;

                // 笔 - markLine
                if (layers.bi && echarts.bi_markline && echarts.bi_markline.length > 0) {
                    series.push({
                        name: '笔',
                        type: 'line',
                        xAxisIndex: 0,
                        yAxisIndex: 0,
                        symbol: 'none',
                        markLine: {
                            silent: true,
                            symbol: ['none', 'none'],
                            data: echarts.bi_markline
                        },
                        z: 10
                    });
                }

                // 中枢 - markArea
                if (layers.zs && echarts.zs_markarea && echarts.zs_markarea.length > 0) {
                    series.push({
                        name: '中枢',
                        type: 'line',
                        xAxisIndex: 0,
                        yAxisIndex: 0,
                        symbol: 'none',
                        markArea: {
                            silent: true,
                            data: echarts.zs_markarea
                        },
                        z: 5
                    });
                }

                // 买卖点 - scatter
                if (layers.bs && echarts.bs_scatter && echarts.bs_scatter.length > 0) {
                    series.push({
                        name: '买卖点',
                        type: 'scatter',
                        xAxisIndex: 0,
                        yAxisIndex: 0,
                        data: echarts.bs_scatter,
                        z: 20
                    });
                }
            }

            return series;
        }

        function toggleLayer(name) {
            layers[name] = !layers[name];
            document.getElementById('toggle-' + name).classList.toggle('on', layers[name]);
            if (chanData) renderChart(chanData);
        }

        function updateChanInfo(result) {
            var stats = result.stats || {};
            var e = result.echarts || {};
            var info = document.getElementById('chan-info');
            info.innerHTML = 
                '<span class="chan-badge bi">笔 <span class="num">' + (stats.bi_count || 0) + '</span></span>' +
                '<span class="chan-badge seg">线段 <span class="num">' + (stats.seg_count || 0) + '</span></span>' +
                '<span class="chan-badge zs">中枢 <span class="num">' + (stats.zs_count || 0) + '</span></span>' +
                '<span class="chan-badge bs">买卖 <span class="num">' + (stats.bs_count || 0) + '</span></span>';
        }

        function updatePrice(result) {
            var el = document.getElementById('price');
            var change = result.change || 0;
            var pct = result.change_pct || 0;
            var cls = change >= 0 ? 'up' : 'down';
            el.className = 'price ' + cls;
            el.textContent = '当前: ' + result.current_price + ' (' + (change >= 0 ? '+' : '') + change.toFixed(0) + ' / ' + pct.toFixed(2) + '%)';
        }

        function calcMA(data, period, closeIdx) {
            var result = [];
            for (var i = 0; i < data.length; i++) {
                if (i < period - 1) { result.push('-'); }
                else {
                    var sum = 0;
                    for (var j = 0; j < period; j++) { sum += data[i - j][closeIdx]; }
                    result.push((sum / period).toFixed(2));
                }
            }
            return result;
        }

        function calcMACD(close) {
            var fast = 12, slow = 26, signal = 9;
            function ema(arr, n) {
                var k = 2 / (n + 1), result = [];
                for (var i = 0; i < arr.length; i++) { result.push(i === 0 ? arr[i] : arr[i] * k + result[i-1] * (1 - k)); }
                return result;
            }
            var emaFast = ema(close, fast);
            var emaSlow = ema(close, slow);
            var diff = emaFast.map(function(v, i) { return v - emaSlow[i]; });
            var dea = ema(diff, signal);
            var bar = diff.map(function(v, i) { return (v - dea[i]) * 2; });
            return { diff: diff, dea: dea, bar: bar };
        }

        function calcKDJ(data) {
            var n = 9;
            var k = [], d = [], j = [];
            for (var i = 0; i < data.length; i++) {
                if (i < n - 1) { k.push(50); d.push(50); }
                else {
                    var maxH = -Infinity, minL = Infinity;
                    for (var t = i - n + 1; t <= i; t++) {
                        if (data[t][3] > maxH) maxH = data[t][3];
                        if (data[t][2] < minL) minL = data[t][2];
                    }
                    var rsv = maxH === minL ? 50 : (data[i][1] - minL) / (maxH - minL) * 100;
                    k.push((2/3) * k[i-1] + (1/3) * rsv);
                    d.push((2/3) * d[i-1] + (1/3) * k[k.length-1]);
                }
                j.push(3 * k[k.length-1] - 2 * d[d.length-1]);
            }
            return { k: k, d: d, j: j };
        }

        document.getElementById('period').addEventListener('change', function(e) {
            currentPeriod = e.target.value;
            loadData();
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
